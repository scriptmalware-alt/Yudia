<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Dompet Digital</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0f0f0f;
    color: white;
}

.container {
    max-width: 420px;
    margin: auto;
    padding: 15px;
}

/* CARD ATAS */
.top-card {
    background: linear-gradient(135deg, #3a2a0f, #000);
    border-radius: 15px;
    padding: 20px;
    position: relative;
    box-shadow: 0 0 20px rgba(255,200,0,0.2);
}

.top-card h3 {
    margin: 0;
    font-size: 14px;
    opacity: 0.8;
}

.balance {
    font-size: 28px;
    margin: 10px 0;
}

.actions {
    display: flex;
    justify-content: space-between;
}

.actions button {
    padding: 8px 15px;
    border-radius: 20px;
    border: 1px solid purple;
    background: transparent;
    color: violet;
    cursor: pointer;
}

/* INFO */
.info-box {
    background: #1c1c1c;
    padding: 12px;
    border-radius: 10px;
    margin-top: 10px;
    display: flex;
    justify-content: space-between;
}

/* TAB */
.tabs {
    display: flex;
    margin-top: 15px;
    gap: 10px;
}

.tabs button {
    flex: 1;
    padding: 10px;
    border-radius: 10px;
    border: none;
    background: #2a2a2a;
    color: white;
}

/* LIST */
.list {
    margin-top: 15px;
}

.item {
    background: #1c1c1c;
    padding: 15px;
    border-radius: 10px;
    margin-bottom: 10px;
}

.item .title {
    font-size: 14px;
    opacity: 0.7;
}

.item .money {
    color: #00e676;
    font-size: 18px;
    margin-top: 5px;
}
</style>

</head>

<body>

<div class="container">

    <!-- CARD ATAS -->
    <div class="top-card">
        <h3>Saldo Dompet</h3>
        <div class="balance">Rp 919,764</div>

        <div class="actions">
            <button>Penarikan</button>
            <button>Isi Ulang</button>
        </div>
    </div>

    <!-- INFO -->
    <div class="info-box">
        <span>Jumlah imbalan aktif</span>
        <span>Rp 0</span>
    </div>

    <div class="info-box">
        <span>Saldo Dompet</span>
        <span>Rp 919,764</span>
    </div>

    <!-- TAB -->
    <div class="tabs">
        <button>Keuntungan harian</button>
        <button>Detail</button>
    </div>

    <!-- LIST -->
    <div class="list">

        <div class="item">
            <div class="title">Keuntungan dari aktivitas dividen</div>
            <div class="money">Rp 99,000</div>
        </div>

        <div class="item">
            <div class="title">Keuntungan dari aktivitas dividen</div>
            <div class="money">Rp 17,100</div>
        </div>

        <div class="item">
            <div class="title">Keuntungan dari aktivitas dividen</div>
            <div class="money">Rp 17,100</div>
        </div>

    </div>

</div>

</body>
</html>
