<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dompet Digital</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0f0f0f;
    color: white;
}

.container {
    padding: 15px;
}

.top-card {
    background: linear-gradient(135deg, #3a2a0f, #000);
    border-radius: 15px;
    padding: 20px;
}

.balance {
    font-size: 6vw;
    margin: 10px 0;
}

.actions {
    display: flex;
    gap: 10px;
}

button {
    flex: 1;
    padding: 10px;
    border-radius: 20px;
    border: 1px solid purple;
    background: transparent;
    color: violet;
}

.info-box {
    background: #1c1c1c;
    padding: 12px;
    border-radius: 10px;
    margin-top: 10px;
    display: flex;
    justify-content: space-between;
}

.tabs {
    display: flex;
    gap: 10px;
    margin-top: 15px;
}

.tabs button {
    background: #2a2a2a;
    color: white;
    border: none;
}

.list {
    margin-top: 15px;
}

.item {
    background: #1c1c1c;
    padding: 15px;
    border-radius: 10px;
    margin-bottom: 10px;
}
.money {
    color: #00e676;
}
</style>

</head>

<body>

<div class="container">

    <div class="top-card">
        <div>Saldo Dompet</div>
        <div class="balance" id="saldo">Rp 100000</div>

        <div class="actions">
            <button onclick="tarik()">Penarikan</button>
            <button onclick="isi()">Isi Ulang</button>
        </div>
    </div>

    <div class="info-box">
        <span>Jumlah imbalan aktif</span>
        <span id="imbalan">Rp 0</span>
    </div>

    <div class="info-box">
        <span>Saldo Dompet</span>
        <span id="saldo2">Rp 100000</span>
    </div>

    <div class="tabs">
        <button onclick="tambahProfit()">Keuntungan harian</button>
        <button onclick="lihatDetail()">Detail</button>
    </div>

    <div class="list" id="list"></div>

</div>

<script>
let saldo = 100000;
let imbalan = 0;

function format(uang){
    return "Rp " + uang.toLocaleString("id-ID");
}

function updateUI(){
    document.getElementById("saldo").innerText = format(saldo);
    document.getElementById("saldo2").innerText = format(saldo);
    document.getElementById("imbalan").innerText = format(imbalan);
}

function isi(){
    let jumlah = prompt("Masukkan jumlah isi ulang:");
    if(jumlah){
        saldo += parseInt(jumlah);
        updateUI();
    }
}

function tarik(){
    let jumlah = prompt("Masukkan jumlah penarikan:");
    if(jumlah && saldo >= jumlah){
        saldo -= parseInt(jumlah);
        updateUI();
    } else {
        alert("Saldo tidak cukup!");
    }
}

function tambahProfit(){
    let profit = Math.floor(Math.random() * 50000) + 10000;
    imbalan += profit;
    saldo += profit;

    let item = document.createElement("div");
    item.className = "item";
    item.innerHTML = `
        <div>Keuntungan harian</div>
        <div class="money">${format(profit)}</div>
    `;
    document.getElementById("list").prepend(item);

    updateUI();
}

function lihatDetail(){
    alert("Total keuntungan: " + format(imbalan));
}

updateUI();
</script>

</body>
</html>
